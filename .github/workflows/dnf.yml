name: Hyperion RPM Build
on:
  workflow_call:
    secrets:
      GPG_KEY:
        required: true
      YUM_USER:
        required: true
      YUM_PASSWORD:
        required: true
      DRAFT_FOLDER:
        required: true

jobs:
  setup:
    name: Setup RPM build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set RPM matrix
        id: dnf-repo
        run: |
          DNF=$(jq -n '.include |= [ inputs[] | select(.["exclude"] != true)]' .github/workflows/dnf/*.json --compact-output)
          echo "dnf=$DNF" >> $GITHUB_OUTPUT

    outputs:
      dnf-matrix: ${{ steps.dnf-repo.outputs.dnf }}

  build:
    name: ${{ matrix.description }}
    needs: [setup]
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.dnf-matrix) }}

    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true

      - name: Generate environment variables
        run: |
          tr -d '\n' < .version > temp && mv temp .version
          VERSION=$(cat .version | sed s/-/_/g)
          echo VERSION=${VERSION} >> $GITHUB_ENV

      - name: Build package
        shell: bash
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/deploy"
          docker run --rm --privileged \
            -w "/root" \
            -v "${GITHUB_WORKSPACE}/deploy:/deploy" \
            -v "${GITHUB_WORKSPACE}:/root/hyperion.ng:ro" \
            ghcr.io/paulchen-panther/${{ matrix.architecture }}:${{ matrix.distribution }}_${{ matrix.version }} \
            /bin/bash -c "tar -zcf rpmbuild/SOURCES/hyperion.ng.tar.gz hyperion.ng/ && \
            cp -f hyperion.ng/rpmbuild/hyperion.spec.in rpmbuild/SPECS/hyperion.spec && \
            sed -ri 's/@VERSION@/${{ env.VERSION }}/g' rpmbuild/SPECS/hyperion.spec && \
            sed -ri 's/@BUILD_REQUIRES@/${{ matrix.build-requires }}/g' rpmbuild/SPECS/hyperion.spec && \
            sed -ri 's/@PACKAGE_REQUIRES@/${{ matrix.package-requires }}/g' rpmbuild/SPECS/hyperion.spec && \
            rpmdev-bumpspec --comment='${{ env.COMMIT_MESSAGE }}' --userstring='${{ env.ACTOR }}' rpmbuild/SPECS/hyperion.spec && \
            rpmbuild -ba rpmbuild/SPECS/hyperion.spec --clean && \
            cp -fv rpmbuild/RPMS/${{ matrix.architecture }}/hyperion* /deploy"
        env:
          ACTOR: "Hyperion Project <admin@hyperion-project.org>"
          COMMIT_MESSAGE: ${{ github.event.commits[0].message }}

      - name: Upload package artifact
        uses: actions/upload-artifact@v3
        with:
          path: deploy
          retention-days: 1

  publish:
    name: Publish RPM packages
    needs: [setup, build]
    runs-on: ubuntu-latest
    container:
      image: fedora
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v5.2.0
        with:
          gpg_private_key: ${{ secrets.GPG_KEY }}

      - name: Install createrepo & rpm-sign
        run: dnf install createrepo rpm-sign -y

      - name: Download artifacts
        uses: actions/download-artifact@v3.0.2

      - name: Make folders, sign/copy packages and create metadata/manifest files
        # The .version file is stored on the server to create a backup when publishing.
        run: |
          mkdir rpm/
          gpg --armor --output rpm/hyperion.pub.key --export 'admin@hyperion-project.org'
          rpm --import rpm/hyperion.pub.key
          cp .version rpm/.version
          for file in artifact/hyperion-*.rpm; do
            if [ -f "$file" ]; then
              dist_ver_arch=${file##*1.}
              dist_ver_arch=${dist_ver_arch%.*}
              dist_ver=${dist_ver_arch%.*}
              arch=${dist_ver_arch#*.}
              dist=${dist_ver:0:2}
              ver=${dist_ver:2}
              case $dist in
                'fc')
                  dist=Fedora
                  ;;
                'el')
                  dist=RHEL
                  ;;
                *)
                  dist=''
                  ;;
              esac
              [ -z "$dist" ] && continue
              rpm=rpm/$dist/$ver/$arch
              mkdir -p $rpm/ && cp $file $rpm/
              rpm --define "_gpg_name ${{ steps.import_gpg.outputs.keyid }}" --addsign $rpm/*.rpm
              rpm --checksig $rpm/*.rpm
              createrepo $rpm/
              gpg --yes --detach-sign --armor $rpm/repodata/repomd.xml
            fi
          done
          for dist in ./rpm/*/
          do
            dist=${dist%*/}
            dist=${dist##*/}
            cp -f ${GITHUB_WORKSPACE}/rpmbuild/hyperion.repo.in rpm/$dist/hyperion.repo
            sed -ri "s/@DIST@/$dist/g" rpm/$dist/hyperion.repo
          done

      - name: Upload to DNF Package Repository (DRAFT)
        uses: SamKirkland/FTP-Deploy-Action@4.3.3
        with:
          server: yum.hyperion-project.org
          username: ${{ secrets.YUM_USER }}
          password: ${{ secrets.YUM_PASSWORD }}
          local-dir: "./rpm/"
          server-dir: ${{ secrets.DRAFT_FOLDER }}
          dangerous-clean-slate: true
