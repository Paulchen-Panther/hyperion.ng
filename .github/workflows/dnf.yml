name: Hyperion RPM Build
on:
  workflow_call:
    secrets:
      APT_GPG:
        required: true
      APT_USER:
        required: true
      APT_PASSWORD:
        required: true
      APT_DRAFT:
        required: true

jobs:
  setup:
    name: Setup RPM build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set RPM matrix
        id: dnf-repo
        run: |
          DNF=$(jq -n '.include |= [ inputs[] | select(.["exclude"] != true)]' .github/workflows/dnf/*.json --compact-output)
          echo "dnf=$DNF" >> $GITHUB_OUTPUT

    outputs:
      dnf-matrix: ${{ steps.dnf-repo.outputs.dnf }}

  build:
    name: ${{ matrix.description }}
    needs: [setup]
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.dnf-matrix) }}

    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true

      - name: Generate environment variables
        run: |
          tr -d '\n' < .version > temp && mv temp .version
          VERSION=$(cat .version | sed s/-/_/g)
          echo VERSION=${VERSION} >> $GITHUB_ENV

      - name: Build package
        shell: bash
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/deploy"
          docker run --rm --privileged \
            -w "/root" \
            -v "${GITHUB_WORKSPACE}/deploy:/deploy" \
            -v "${GITHUB_WORKSPACE}:/root/hyperion.ng:ro" \
            ghcr.io/paulchen-panther/${{ matrix.architecture }}:${{ matrix.distribution }}_${{ matrix.version }} \
            /bin/bash -c "tar -zcf rpmbuild/SOURCES/hyperion.ng.tar.gz hyperion.ng/ && \
            cp -f hyperion.ng/rpmbuild/hyperion.spec rpmbuild/SPECS/hyperion.spec && \
            sed -ri 's/@VERSION@/${{ env.VERSION }}/g' rpmbuild/SPECS/hyperion.spec && \
            sed -ri 's/@BUILD_REQUIRES@/${{ matrix.build-requires }}/g' rpmbuild/SPECS/hyperion.spec && \
            sed -ri 's/@PACKAGE_REQUIRES@/${{ matrix.package-requires }}/g' rpmbuild/SPECS/hyperion.spec && \
            rpmdev-bumpspec --comment='${{ env.COMMIT_MESSAGE }}' --userstring='${{ env.ACTOR }}' rpmbuild/SPECS/hyperion.spec && \
            rpmbuild -ba rpmbuild/SPECS/hyperion.spec --clean && \
            cp -fv rpmbuild/RPMS/${{ matrix.architecture }}/hyperion* /deploy"
        env:
          ACTOR: "Hyperion Project <admin@hyperion-project.org>"
          COMMIT_MESSAGE: ${{ github.event.commits[0].message }}

      - name: Upload package artifact
        uses: actions/upload-artifact@v3
        with:
          path: deploy
          retention-days: 1

  publish:
    name: Publish RPM packages
    needs: [setup, build]
    runs-on: ubuntu-latest
    container:
      image: fedora
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v5.2.0
        with:
          gpg_private_key: ${{ secrets.APT_GPG }}

      - name: Install createrepo & rpm-sign
        run: dnf install createrepo rpm-sign -y

      - name: Download artifacts
        uses: actions/download-artifact@v3.0.2

      - name: Make folders/copy and sign packages/create metadata
        run: |
          gpg --armor --output hyperion.pub.key --export 'admin@hyperion-project.org'
          rpm --import hyperion.pub.key
          for file in artifact/hyperion-*.rpm; do
            if [ -f "$file" ]; then
              dist_arch=${file##*1.}
              dist_arch=${dist_arch%.*}
              dist=${dist_arch%.*}
              arch=${dist_arch#*.}
              rpm=rpm/${dist:0:2}/${dist:2}/$arch
              mkdir -p $rpm/ && cp $file $rpm/
              rpm --define "_gpg_name ${{ steps.import_gpg.outputs.keyid }}" --addsign $rpm/*.rpm
              rpm --checksig $rpm/*.rpm
              createrepo $rpm/
              gpg --yes --detach-sign --armor $rpm/repomd.xml
            fi
          done

      - name: Upload to DNF Package Repository (DRAFT)
        uses: SamKirkland/FTP-Deploy-Action@4.3.3
        with:
          server: apt.hyperion-project.org
          username: ${{ secrets.APT_USER }}
          password: ${{ secrets.APT_PASSWORD }}
          local-dir: "./rpm/"
          server-dir: ${{ secrets.APT_DRAFT }}
