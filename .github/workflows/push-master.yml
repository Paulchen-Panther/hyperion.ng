name: Hyperion CI Build
on:
  push:
    branches:
      - '**'
    tags:
      - '*'

jobs:

##########################
###### RPM workflow ######
##########################

  rpm_build:
    name: RPM Build GitHub Releases
    uses: ./.github/workflows/dnf.yml
    secrets:
      GPG_KEY: ${{ secrets.GPG_KEY }}
      YUM_USER: ${{ secrets.YUM_USER }}
      YUM_PASSWORD: ${{ secrets.YUM_PASSWORD }}
      DRAFT_FOLDER: ${{ secrets.DRAFT_FOLDER }}
