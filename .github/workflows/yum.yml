name: Hyperion YUM Build
on:
  workflow_call:
    secrets:
      YUM_GPG:
        required: true
      YUM_USER:
        required: true
      YUM_PASSWORD:
        required: true
      YUM_DRAFT:
        required: true

jobs:
  setup:
    name: Setup YUM build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set YUM matrix
        id: yum-repo
        run: |
          YUM=$(jq -n '.include |= [ inputs[] | select(.["exclude"] != true)]' .github/workflows/yum/*.json --compact-output)
          echo "yum=$YUM" >> $GITHUB_OUTPUT

    outputs:
      yum-matrix: ${{ steps.yum-repo.outputs.yum }}

  build:
    name: ${{ matrix.description }}
    needs: [setup]
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.yum-matrix) }}

    steps:
