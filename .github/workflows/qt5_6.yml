name: GitHub Qt5/6 Builds

on:
  # Reusable from push_pull.yml
  workflow_call:
    inputs:
      qt_version:
        type: string
        description: Build with this Qt version
        default: '5'
        required: false

env:
  ghcr: hyperion-project

jobs:
  macOS:
    name: 🍏 macOS test
    runs-on: macos-latest
    steps:
      - name: 🔧 Prepare
        shell: bash
        run: |
            brew update || true
            brew install qt${{ inputs.qt_version }} libusb
            brew link qt@${{ inputs.qt_version }} --force
