name: Release Actions
on:
  release:
    types: [published]

jobs:
  dnf_release:
    name: Backup/Release DNF repository
    runs-on: ubuntu-latest
    steps:
      - name: Create Backup and Release draft files on DNF repository
        run: |
          sudo apt-get install -y ncftp
          mkdir backup draft_folder
          ncftpget -R -T -V -u ${{ secrets.YUM_USER }} -p ${{ secrets.YUM_PASSWORD }} yum.hyperion-project.org ./backup/ ./
          cd backup/ && mv ${{ secrets.DRAFT_FOLDER }}{.,}* ../draft_folder/ && rm *.tar.gz 2> /dev/null
          tar -zcf ../backup_$(cat .version).tar.gz .
          find -maxdepth 1 $(printf "! -name %s " ${{ secrets.EXCLUDED_FTP_FILES }}) -exec rm -rv {} \; 2> /dev/null
          mv ../draft_folder/* . 2> /dev/null && mv ../backup_$(cat .version).tar.gz . 2> /dev/null

      - name: Update DNF Package Repository (Release)
        uses: SamKirkland/FTP-Deploy-Action@4.3.3
        with:
          server: yum.hyperion-project.org
          username: ${{ secrets.YUM_USER }}
          password: ${{ secrets.YUM_PASSWORD }}
          local-dir: "./backup/"
          server-dir: ./
          dangerous-clean-slate: true
